<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión Pro - Eléctricas Centro S.L</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb; --primary-dark: #1e40af;
            --success: #10b981; --danger: #ef4444;
            --warning: #f59e0b; --bg: #f8fafc;
            --white: #ffffff; --text-main: #1e293b;
            --text-muted: #64748b; --radius: 12px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; }

        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 1.6rem; color: var(--primary); margin: 0; }

        /* CONTADORES PRINCIPALES */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-box { background: white; padding: 15px; border-radius: var(--radius); text-align: center; box-shadow: var(--shadow); border-bottom: 4px solid #ddd; }
        .stat-box span { display: block; font-size: 1.4rem; font-weight: 800; }
        .stat-box small { color: var(--text-muted); font-weight: 600; text-transform: uppercase; font-size: 0.7rem; }
        .box-curso { border-color: var(--warning); }
        .box-fin { border-color: var(--success); }

        /* PANTALLAS */
        .pantalla { display: none; }
        .pantalla.activa { display: block; }

        /* LISTADO */
        .card-resumen {
            background: var(--white); padding: 18px; border-radius: var(--radius);
            margin-bottom: 12px; box-shadow: var(--shadow); cursor: pointer;
            border: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center;
        }
        .card-resumen:hover { border-color: var(--primary); background: #f0f7ff; }

        /* SUBPANTALLA DETALLE */
        .btn-volver { background: none; border: none; color: var(--primary); font-weight: bold; cursor: pointer; margin-bottom: 15px; padding: 0; }
        .seccion-titulo { font-size: 0.9rem; font-weight: 800; color: var(--text-muted); margin: 20px 0 10px 0; display: block; border-bottom: 1px solid #e2e8f0; }

        /* FORMULARIOS */
        .form-mini { display: flex; gap: 5px; margin-bottom: 15px; }
        .form-mini input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 0.9rem; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 0 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-add-mat { background: var(--success); }

        /* ITEMS (TAREAS Y MATERIALES) */
        .item-row { background: white; padding: 10px; border-radius: 8px; margin-bottom: 6px; display: flex; align-items: center; gap: 10px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .item-row span { flex: 1; font-size: 0.95rem; }
        .btn-del-small { background: none; border: none; color: #ccc; cursor: pointer; font-size: 0.9rem; }
        .btn-del-small:hover { color: var(--danger); }
        .completada { text-decoration: line-through; color: var(--text-muted); opacity: 0.5; }

        textarea { width: 100%; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; box-sizing: border-box; font-family: inherit; background: #fffdf2; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>⚡CONTROL DE OBRAS⚡</h1>
    </div>

    <div id="pantallaListado" class="pantalla activa">
        <div class="stats-grid">
            <div class="stat-box box-curso">
                <span id="numCurso">0</span>
                <small>En curso</small>
            </div>
            <div class="stat-box box-fin">
                <span id="numFin">0</span>
                <small>Finalizadas</small>
            </div>
        </div>

        <div class="form-mini">
            <input type="text" id="nuevoNombreObra" placeholder="Nombre de obra o cliente...">
            <button class="btn-add" onclick="crearObra()">CREAR</button>
        </div>
        <div id="listaObras"></div>
    </div>

    <div id="pantallaDetalle" class="pantalla">
        <button class="btn-volver" onclick="irAListado()">← VOLVER AL LISTADO</button>
        <div id="contenidoDetalle"></div>
    </div>
</div>

<script>
    let obras = JSON.parse(localStorage.getItem('obras_v_final')) || [];
    let idObraActual = null;

    function guardar() { localStorage.setItem('obras_v_final', JSON.stringify(obras)); }

    function irADetalle(id) {
        idObraActual = id;
        document.getElementById('pantallaListado').classList.remove('activa');
        document.getElementById('pantallaDetalle').classList.add('activa');
        renderDetalle();
    }

    function irAListado() {
        idObraActual = null;
        document.getElementById('pantallaDetalle').classList.remove('activa');
        document.getElementById('pantallaListado').classList.add('activa');
        renderListado();
    }

    function crearObra() {
        const input = document.getElementById('nuevoNombreObra');
        if (!input.value.trim()) return;
        obras.push({ id: Date.now(), nombre: input.value, tareas: [], materiales: [], notas: "" });
        input.value = '';
        guardar();
        renderListado();
    }

    function renderListado() {
        const contenedor = document.getElementById('listaObras');
        let enCurso = 0, finalizadas = 0;
        contenedor.innerHTML = '';

        obras.forEach(obra => {
            const hechas = obra.tareas.filter(t => t.hecha).length;
            const total = obra.tareas.length;
            const porc = total === 0 ? 0 : Math.round((hechas/total)*100);
            
            // Lógica de contadores
            (total > 0 && hechas === total) ? finalizadas++ : enCurso++;

            contenedor.innerHTML += `
                <div class="card-resumen" onclick="irADetalle(${obra.id})">
                    <div>
                        <strong style="display:block">${obra.nombre}</strong>
                        <small style="color:var(--text-muted)">${obra.materiales.length} materiales registrados</small>
                    </div>
                    <div style="text-align:right">
                        <span style="font-weight:800; color:var(--primary)">${porc}%</span>
                    </div>
                </div>`;
        });
        document.getElementById('numCurso').innerText = enCurso;
        document.getElementById('numFin').innerText = finalizadas;
    }

    function renderDetalle() {
        const obra = obras.find(o => o.id === idObraActual);
        const contenedor = document.getElementById('contenidoDetalle');
        
        const tareasHTML = obra.tareas.map(t => `
            <div class="item-row">
                <input type="checkbox" ${t.hecha ? 'checked' : ''} onchange="toggleTarea(${t.id})">
                <span class="${t.hecha ? 'completada' : ''}">${t.texto}</span>
                <button class="btn-del-small" onclick="borrarItem('tareas', ${t.id})">✕</button>
            </div>`).join('');

        const materialesHTML = obra.materiales.map(m => `
            <div class="item-row" style="border-left: 4px solid var(--success)">
                <span>${m.texto}</span>
                <button class="btn-del-small" onclick="borrarItem('materiales', ${m.id})">✕</button>
            </div>`).join('');

        contenedor.innerHTML = `
            <h2 style="margin:0">${obra.nombre}</h2>
            
            <span class="seccion-titulo">NOTAS Y UBICACIÓN</span>
            <textarea rows="2" onblur="actualizarNotas(this.value)">${obra.notas}</textarea>

            <span class="seccion-titulo">LISTA DE TAREAS</span>
            <div class="form-mini">
                <input type="text" id="inTarea" placeholder="Nueva tarea...">
                <button class="btn-add" onclick="agregarItem('tareas', 'inTarea')">+</button>
            </div>
            <div>${tareasHTML || '<small>Sin tareas</small>'}</div>

            <span class="seccion-titulo">MATERIALES UTILIZADOS</span>
            <div class="form-mini">
                <input type="text" id="inMat" placeholder="Ej: Tubo corrugado 20m...">
                <button class="btn-add btn-add-mat" onclick="agregarItem('materiales', 'inMat')">+</button>
            </div>
            <div>${materialesHTML || '<small>Sin materiales</small>'}</div>

            <button style="margin-top:30px; color:var(--danger); background:none; border:none; cursor:pointer; font-size:0.7rem" onclick="borrarObra(${obra.id})">ELIMINAR ESTA OBRA</button>
        `;
    }

    function agregarItem(tipo, inputId) {
        const val = document.getElementById(inputId).value.trim();
        if (!val) return;
        const obra = obras.find(o => o.id === idObraActual);
        obra[tipo].push({ id: Date.now(), texto: val, hecha: false });
        guardar();
        renderDetalle();
    }

    function borrarItem(tipo, idItem) {
        const obra = obras.find(o => o.id === idObraActual);
        obra[tipo] = obra[tipo].filter(i => i.id !== idItem);
        guardar();
        renderDetalle();
    }

    function toggleTarea(idT) {
        const obra = obras.find(o => o.id === idObraActual);
        const t = obra.tareas.find(x => x.id === idT);
        t.hecha = !t.hecha;
        guardar();
        renderDetalle();
    }

    function actualizarNotas(v) { 
        obras.find(o => o.id === idObraActual).notas = v; 
        guardar(); 
    }

    function borrarObra(id) { 
        if(confirm("¿Borrar obra?")) { 
            obras = obras.filter(o => o.id !== id); 
            guardar(); 
            irAListado(); 
        } 
    }

    renderListado();
</script>
</body>
</html>
